name: Docker Image Sync to Aliyun

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'images.txt'
  # 新增：每天北京时间凌晨3点运行（UTC时间19:00，因为UTC+8=北京时间）
  schedule:
    - cron: '0 19 * * *'

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  WEBHOOK_URL: "${{ secrets.WEBHOOK_URL }}" # 在 Secrets 中配置飞书或企微地址

jobs:
  build:
    name: Sync Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize build space (增强版)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096          # 增加根目录预留空间
          swap-size-mb: 2048             # 增大交换空间
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'          # 移除 CodeQL
          remove-android: 'true'         # 移除 Android SDK
          remove-docker-images: 'true'   # 移除预安装的 Docker 镜像
          build-mount-path: '/var/lib/docker/'

      - name: 清理 Docker 缓存和旧镜像 (预清理)
        run: |
          # 显示当前磁盘使用情况
          df -h
          # 停止 Docker 服务
          sudo systemctl stop docker
          # 清理 Docker 所有数据
          sudo rm -rf /var/lib/docker/*
          sudo rm -rf /var/lib/containerd/*
          # 重启 Docker
          sudo systemctl start docker
          # 再次检查磁盘空间
          df -h

      - name: 配置 Docker 优化 (减少空间占用)
        run: |
          # 配置 Docker 使用 overlay2 并设置临时目录
          sudo mkdir -p /etc/docker
          echo '{
            "storage-driver": "overlay2",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }' | sudo tee /etc/docker/daemon.json
          sudo systemctl daemon-reload
          sudo systemctl restart docker
          # 验证 Docker 状态
          docker info | grep -E 'Space|Driver|Size'

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo
        
      - name: Sync and Push to Aliyun
        id: sync_step
        run: |
          SYNC_SUMMARY=""
          SUCCESS_COUNT=0
          FAILURE_COUNT=0

          while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" ]] || [[ "$line" =~ ^\s*# ]] && continue

              raw_image=$(echo "$line" | awk '{print $NF}')
              full_image="${raw_image%%@*}"

              # 改进解析：分离镜像名和 tag（更清晰稳健）
              if [[ "$full_image" == *:* ]]; then
                  image_repo="${full_image%:*}"
                  tag="${full_image#*:}"
              else
                  image_repo="$full_image"
                  tag="latest"
              fi
              image_name=$(basename "$image_repo")
              dir_part=$(dirname "$image_repo")
              org_part=$([[ "$dir_part" == "." ]] && echo "library" || echo "$dir_part" | tr '/' '_')

              new_repo_name="${org_part}_${image_name}"
              target_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$new_repo_name:$tag"

              echo ">>> Processing: $full_image → $target_image"

              # 获取上游 digest
              if ! source_digest=$(skopeo inspect --format '{{.Digest}}' "docker://$full_image" 2>/dev/null); then
                  echo ">>> ❌ 源镜像无法访问: $full_image"
                  SYNC_SUMMARY="${SYNC_SUMMARY}\n🚨 ${full_image} (源不可用)"
                  FAILURE_COUNT=$((FAILURE_COUNT + 1))
                  continue
              fi

              # 判断是否需要同步（对比 digest）
              need_sync=true
              if target_digest=$(skopeo inspect --format '{{.Digest}}' "docker://$target_image" --creds "$ALIYUN_REGISTRY_USER:$ALIYUN_REGISTRY_PASSWORD" 2>/dev/null); then
                  if [[ "$source_digest" == "$target_digest" ]]; then
                      echo ">>> ✅ Skip (已是最新): $full_image"
                      need_sync=false
                  else
                      echo ">>> 🔄 需要更新 (digest 已变化): $full_image"
                  fi
              else
                  echo ">>> ✨ 新镜像: $full_image"
              fi

              # 执行同步（使用 skopeo copy --all）
              if [[ "$need_sync" == true ]]; then
                  if skopeo copy --all \
                      "docker://$full_image" \
                      "docker://$target_image" \
                      --dest-creds "$ALIYUN_REGISTRY_USER:$ALIYUN_REGISTRY_PASSWORD"; then
                      SYNC_SUMMARY="${SYNC_SUMMARY}\n✨ ${full_image}"
                      SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  else
                      SYNC_SUMMARY="${SYNC_SUMMARY}\n🚨 ${full_image} (同步失败)"
                      FAILURE_COUNT=$((FAILURE_COUNT + 1))
                  fi
              fi
          done < images.txt

          # 写入环境变量（你的通知逻辑保持不变）
          echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_ENV
          echo "FAILURE_COUNT=$FAILURE_COUNT" >> $GITHUB_ENV
          {
            echo 'SYNC_RESULT<<EOF'
            echo -e "$SYNC_SUMMARY"
            echo 'EOF'
          } >> $GITHUB_ENV
